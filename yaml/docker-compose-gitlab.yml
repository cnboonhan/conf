version: '3.5'
services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    hostname: gitlab.local.com
    restart: unless-stopped
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        gitlab_rails['gitlab_shell_ssh_port'] = 8822
        external_url 'https://gitlab.local.com'
    ports:
      - "8800:80"
      - "8443:443"
      - "8822:22"
    volumes:
      - /srv/gitlab/config/gitlab:/etc/gitlab
      - /srv/gitlab/data/gitlab:/var/opt/gitlab
      - /srv/gitlab/logs:/var/log/gitlab
    networks:
      - gitlab

  gitlab-runner:
    image: gitlab/gitlab-runner:alpine
    restart: unless-stopped
    depends_on:
      - gitlab
    volumes:
      - /srv/gitlab/config/gitlab-runner:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/gitlab/config/gitlab/ssl:/etc/gitlab/ssl
    networks:
      - gitlab

networks:
  gitlab:
    name: gitlab-network
