name: CI

on:
  push:
    branches: [ "*" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Run bootstrap
        run: |
          wget https://raw.githubusercontent.com/cnboonhan/conf/main/bootstrap.py
          python3 bootstrap.py
